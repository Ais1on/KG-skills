<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KG Agent Manager</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d7deea;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #1d4ed8;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #dbeafe, #f4f7fb 50%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1.1fr 1fr;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.06);
    }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; color: var(--muted); }
    .grid2 {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }
    label {
      display: block;
      font-size: 13px;
      margin: 0 0 4px;
      color: #374151;
    }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      color: inherit;
      background: #fff;
    }
    textarea { min-height: 82px; resize: vertical; }
    button {
      cursor: pointer;
      font-weight: 600;
      background: #e5edff;
      border-color: #bfd0ff;
    }
    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    button.danger {
      background: #fee2e2;
      color: var(--danger);
      border-color: #fecaca;
    }
    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .mcp-item {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fbfdff;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .list {
      max-height: 200px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fafcff;
      font-size: 13px;
    }
    .chat {
      display: grid;
      gap: 8px;
      grid-template-rows: auto 1fr auto;
      min-height: 500px;
    }
    .messages {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      overflow: auto;
      max-height: 420px;
      background: #fafcff;
    }
    .msg {
      margin: 6px 0;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .msg.user { color: #1d4ed8; }
    .msg.agent { color: #111827; }
    .msg.event { color: #6b7280; font-size: 12px; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>KG Agent Manager</h1>
      <p class="muted">创建 Agent，配置 Tool/MCP/Skill，然后直接对话测试。</p>

      <h2>Agent 配置</h2>
      <div class="grid2">
        <div>
          <label>Agent 名称</label>
          <input id="name" placeholder="可选，不填自动生成" />
        </div>
        <div>
          <label>Model</label>
          <input id="model" />
        </div>
        <div>
          <label>API Base</label>
          <input id="api_base" />
        </div>
        <div>
          <label>API Key Env</label>
          <input id="api_key_env" />
        </div>
        <div>
          <label>Temperature</label>
          <input id="temperature" type="number" step="0.1" min="0" max="2" />
        </div>
        <div>
          <label>.env 文件路径</label>
          <input id="env_file" value=".env" />
        </div>
      </div>

      <h2 style="margin-top:14px;">Tool 配置</h2>
      <label>本地 Tool 模块（每行一个）</label>
      <textarea id="local_tool_modules"></textarea>

      <h2 style="margin-top:14px;">Skill 配置</h2>
      <div class="row">
        <div>
          <label>skills_dir</label>
          <input id="skills_dir" value="skills" />
        </div>
        <div style="align-self:flex-end;">
          <button id="refresh_skills">刷新 Skill 列表</button>
        </div>
      </div>
      <div id="skill_list" class="list"></div>

      <h2 style="margin-top:14px;">MCP 配置</h2>
      <div id="mcp_list"></div>
      <div class="row">
        <button id="add_mcp">新增 MCP</button>
        <button id="create_agent" class="primary">创建 Agent</button>
      </div>
      <p id="create_status" class="muted"></p>
    </div>

    <div class="card chat">
      <div>
        <h2>Agent 会话（SSE 流式）</h2>
        <div class="row">
          <select id="agent_select"></select>
          <button id="reload_agents">刷新 Agent 列表</button>
          <button id="remove_agent" class="danger">删除</button>
        </div>
        <p id="agent_info" class="muted"></p>
      </div>

      <div id="messages" class="messages"></div>

      <div>
        <label>输入消息</label>
        <textarea id="chat_input" placeholder="例如：请调用 tavily_search 搜索最新 OpenSSH CVE"></textarea>
        <div class="row" style="margin-top:8px;">
          <input id="thread_id" value="default" placeholder="thread id" />
          <button id="send_chat" class="primary">发送（流式）</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);

    const state = {
      agents: [],
      activeStream: null,
    };

    function addMsg(role, text = "") {
      const box = el("messages");
      const node = document.createElement("div");
      node.className = `msg ${role}`;
      node.textContent = text;
      box.appendChild(node);
      box.scrollTop = box.scrollHeight;
      return node;
    }

    function setMsg(node, role, text) {
      node.className = `msg ${role}`;
      node.textContent = text;
      const box = el("messages");
      box.scrollTop = box.scrollHeight;
    }

    function addEventLine(text) {
      addMsg("event", `[event] ${text}`);
    }

    function addMcpItem(value = {}) {
      const wrap = document.createElement("div");
      wrap.className = "mcp-item";
      wrap.innerHTML = `
        <div class="grid2">
          <div><label>Name</label><input class="mcp-name" value="${value.name || ""}" /></div>
          <div><label>Transport</label><input class="mcp-transport" value="${value.transport || "stdio"}" /></div>
          <div><label>Command</label><input class="mcp-command" value="${value.command || ""}" /></div>
          <div><label>Args(JSON数组)</label><input class="mcp-args" value='${JSON.stringify(value.args || [])}' /></div>
        </div>
        <label>Env(JSON对象)</label>
        <input class="mcp-env" value='${JSON.stringify(value.env || {})}' />
        <div style="margin-top:8px;"><button class="danger remove-mcp" type="button">删除 MCP</button></div>
      `;
      wrap.querySelector(".remove-mcp").onclick = () => wrap.remove();
      el("mcp_list").appendChild(wrap);
    }

    function parseJsonSafe(text, fallback) {
      try {
        const v = JSON.parse(text || "");
        return v;
      } catch {
        return fallback;
      }
    }

    function collectMcpServers() {
      return [...document.querySelectorAll(".mcp-item")].map((item) => ({
        name: item.querySelector(".mcp-name").value.trim(),
        transport: item.querySelector(".mcp-transport").value.trim() || "stdio",
        command: item.querySelector(".mcp-command").value.trim(),
        args: parseJsonSafe(item.querySelector(".mcp-args").value.trim(), []),
        env: parseJsonSafe(item.querySelector(".mcp-env").value.trim(), {}),
      })).filter((x) => x.name);
    }

    function collectPayload() {
      return {
        name: el("name").value.trim() || null,
        model: el("model").value.trim(),
        api_base: el("api_base").value.trim(),
        api_key_env: el("api_key_env").value.trim(),
        temperature: Number(el("temperature").value || "0"),
        env_file: el("env_file").value.trim() || ".env",
        skills_dir: el("skills_dir").value.trim() || "skills",
        local_tool_modules: el("local_tool_modules").value.split("\n").map((x) => x.trim()).filter(Boolean),
        mcp_servers: collectMcpServers(),
      };
    }

    async function loadDefaults() {
      const res = await fetch("/api/defaults");
      const data = await res.json();
      const c = data.config;
      el("model").value = c.model;
      el("api_base").value = c.api_base;
      el("api_key_env").value = c.api_key_env;
      el("temperature").value = c.temperature;
      el("skills_dir").value = c.skills_dir;
      el("local_tool_modules").value = (c.local_tool_modules || []).join("\n");
      el("skill_list").textContent = (data.skills || []).join("\n") || "(无)";
    }

    async function refreshSkills() {
      const skillsDir = el("skills_dir").value.trim() || "skills";
      const res = await fetch(`/api/skills?skills_dir=${encodeURIComponent(skillsDir)}`);
      const data = await res.json();
      const rows = (data.skills || []).map((s) => `${s.name} - ${s.short_description || s.description || ""}`);
      el("skill_list").textContent = rows.join("\n") || "(无)";
    }

    async function refreshAgents(selectId) {
      const res = await fetch("/api/agents");
      const data = await res.json();
      state.agents = data.agents || [];

      const sel = el("agent_select");
      sel.innerHTML = "";
      state.agents.forEach((a) => {
        const op = document.createElement("option");
        op.value = a.agent_id;
        op.textContent = `${a.name} (${a.agent_id})`;
        sel.appendChild(op);
      });

      if (selectId) {
        sel.value = selectId;
      }

      if (!sel.value && state.agents.length) {
        sel.value = state.agents[0].agent_id;
      }

      await showAgentInfo();
    }

    async function showAgentInfo() {
      const agentId = el("agent_select").value;
      if (!agentId) {
        el("agent_info").textContent = "当前没有已创建 Agent";
        return;
      }

      const res = await fetch(`/api/agents/${encodeURIComponent(agentId)}`);
      const data = await res.json();
      const tools = (data.tools || []).join(", ");
      const skills = (data.skills || []).join(", ");
      el("agent_info").textContent = `Model=${data.config.model} | Tools=${tools || "-"} | Skills=${skills || "-"}`;
    }

    async function createAgent() {
      const payload = collectPayload();
      el("create_status").textContent = "创建中...";

      const res = await fetch("/api/agents", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      const data = await res.json();
      if (!res.ok) {
        el("create_status").textContent = `创建失败: ${data.detail || "unknown error"}`;
        return;
      }

      el("create_status").textContent = `创建成功: ${data.name} (${data.agent_id})`;
      await refreshAgents(data.agent_id);
    }

    async function removeAgent() {
      const agentId = el("agent_select").value;
      if (!agentId) {
        return;
      }
      const res = await fetch(`/api/agents/${encodeURIComponent(agentId)}`, { method: "DELETE" });
      if (res.ok) {
        addEventLine(`已删除 Agent ${agentId}`);
        await refreshAgents();
      }
    }

    function closeActiveStream() {
      if (state.activeStream) {
        state.activeStream.close();
        state.activeStream = null;
      }
    }

    async function sendChat() {
      const agentId = el("agent_select").value;
      if (!agentId) {
        addEventLine("请先创建 Agent");
        return;
      }

      const message = el("chat_input").value.trim();
      if (!message) {
        return;
      }

      const threadId = el("thread_id").value.trim() || "default";
      setMsg(addMsg("user"), "user", `You: ${message}`);
      el("chat_input").value = "";

      closeActiveStream();

      const sendBtn = el("send_chat");
      sendBtn.disabled = true;

      const answerNode = addMsg("agent", "Agent: ");
      let answerText = "";
      let streamClosedByDone = false;

      const streamUrl = `/api/agents/${encodeURIComponent(agentId)}/chat/stream?message=${encodeURIComponent(message)}&thread_id=${encodeURIComponent(threadId)}`;
      const source = new EventSource(streamUrl);
      state.activeStream = source;

      source.addEventListener("status", (e) => {
        const data = parseJsonSafe(e.data, {});
        const phase = data.phase || "unknown";
        addEventLine(`status: ${phase}`);
      });

      source.addEventListener("tool", (e) => {
        const data = parseJsonSafe(e.data, {});
        const phase = data.phase || "unknown";
        const tool = data.tool || "unknown_tool";
        const preview = data.input_preview || data.output_preview || data.args_preview || "";
        addEventLine(`tool ${phase}: ${tool}${preview ? ` | ${preview}` : ""}`);
      });

      source.addEventListener("token", (e) => {
        const data = parseJsonSafe(e.data, {});
        const delta = String(data.text || "");
        answerText += delta;
        setMsg(answerNode, "agent", `Agent: ${answerText}`);
      });

      source.addEventListener("error", (e) => {
        const data = parseJsonSafe(e.data, {});
        if (data.detail) {
          addEventLine(`error: ${data.detail}`);
        }
      });

      source.addEventListener("done", (e) => {
        streamClosedByDone = true;
        const data = parseJsonSafe(e.data, {});
        if (!data.ok) {
          addEventLine("流式响应异常结束");
        }
        source.close();
        state.activeStream = null;
        sendBtn.disabled = false;
      });

      source.onerror = () => {
        if (!streamClosedByDone) {
          addEventLine("流连接中断");
        }
        source.close();
        state.activeStream = null;
        sendBtn.disabled = false;
      };
    }

    el("add_mcp").onclick = () => addMcpItem();
    el("refresh_skills").onclick = refreshSkills;
    el("reload_agents").onclick = () => refreshAgents();
    el("agent_select").onchange = showAgentInfo;
    el("create_agent").onclick = createAgent;
    el("remove_agent").onclick = removeAgent;
    el("send_chat").onclick = sendChat;

    window.addEventListener("load", async () => {
      await loadDefaults();
      addMcpItem({
        name: "filesystem",
        transport: "stdio",
        command: "npx",
        args: ["-y", "@modelcontextprotocol/server-filesystem", "."],
        env: {},
      });
      await refreshSkills();
      await refreshAgents();
    });
  </script>
</body>
</html>
